# Test configuration for EDA library integration tests
firefly.eda.enabled=true
firefly.eda.publishers.enabled=true
firefly.eda.consumer.enabled=true
firefly.eda.publishers.application-event.enabled=true
firefly.eda.publishers.kafka.default.enabled=true
firefly.eda.publishers.rabbitmq.default.enabled=true
firefly.eda.consumer.kafka.default.enabled=true
firefly.eda.consumer.rabbitmq.default.enabled=true

# Disable Spring Boot's default R2DBC / actuator auto-configuration so that
# the presence of r2dbc-postgresql on the classpath (required by the
# Firefly EDA Postgres adapter) does not force Spring Boot to try to create
# a default ConnectionFactory from spring.r2dbc.* properties.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.r2dbc.R2dbcAutoConfiguration,\
  org.springframework.boot.autoconfigure.r2dbc.R2dbcRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.r2dbc.R2dbcTransactionManagerAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.r2dbc.ConnectionFactoryHealthContributorAutoConfiguration

# AWS Configuration (required for Spring Cloud AWS auto-configuration)
cloud.aws.region.static=us-east-1
cloud.aws.credentials.access-key=test
cloud.aws.credentials.secret-key=test
spring.cloud.aws.region.static=us-east-1

# Debug logging
logging.level.org.fireflyframework.eda=DEBUG
logging.level.org.fireflyframework.eda.consumer.rabbitmq=DEBUG
logging.level.org.fireflyframework.eda.listener=DEBUG
logging.level.org.fireflyframework.eda.publisher.rabbitmq=DEBUG
logging.level.org.fireflyframework.eda.testconfig=DEBUG
